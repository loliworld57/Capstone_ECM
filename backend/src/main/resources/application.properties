# ========================
# PostgreSQL Configuration
# ========================
server.port=${PORT:8080}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.binaryTransfer=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}

# Cấu hình Mail Server (Resend API)
app.email.from=ECM <noreply@ecm.io.vn>
resend.api.key=${RESEND_API_KEY}

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.web.client.RestTemplate=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.HttpEntityMethodProcessor=INFO
# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Tăng giới hạn dung lượng cho 1 file (Ví dụ: 20MB)
spring.servlet.multipart.max-file-size=20MB

# Tăng giới hạn dung lượng cho toàn bộ request (Ví dụ: 25MB)
spring.servlet.multipart.max-request-size=25MB

# ========================
# SpringDoc OpenAPI Configuration
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=true

# API Title and Description
springdoc.api-docs.title=Extra Center Management API
springdoc.api-docs.description=API for managing educational centers, courses, enrollments, and users
springdoc.api-docs.version=OPENAPI_3_0

